spring.application.name=PaymentsApp
server.port=8080

# ===============================
# ========== DATABASE ===========
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/payment_app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# ===== JPA / HIBERNATE =========
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# ========= JWT CONFIG ==========
# ===============================

# Must be at least 32 characters
jwt.secret=myverylongsecretkeymyverylongsecretkey123456
jwt.expiration=86400000

# ===============================
# ======== STRIPE CONFIG ========
# ===============================

stripe.secret.key=your_stripe_secret_key
stripe.public.key=your_stripe_public_key

# ===============================
# ========= LOGGING =============
# ===============================

logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE